<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800&family=JetBrains+Mono:wght@700&display=swap');
  * { margin: 0; padding: 0; }
  body { background: #09090b; padding: 48px; font-family: 'Inter', sans-serif; color: #fff; }
  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: #555; margin: 32px 0 16px; }
  .row { display: flex; gap: 32px; align-items: center; flex-wrap: wrap; margin-bottom: 24px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .item span { font-size: 9px; color: #444; letter-spacing: 1px; }
  .light-box { background: #fafafa; padding: 24px 32px; border-radius: 12px; display: inline-flex; align-items: center; }
  .dark-box { background: #09090b; padding: 24px 32px; border-radius: 12px; border: 1px solid #1e1e22; display: inline-flex; align-items: center; }
  .github { background: #0d1117; padding: 16px; border-radius: 50%; display: inline-flex; }
</style>
</head>
<body>

<h2>Full Logo — Dark</h2>
<div class="row">
  <div class="dark-box">
    <svg width="320" height="80" viewBox="0 0 320 80">
      <g transform="translate(4,4)">
        <polygon points="36,2 66,18 66,54 36,70 6,54 6,18" fill="none" stroke="#6366f1" stroke-width="2.5"/>
        <circle cx="36" cy="0" r="2" fill="#6366f1"/>
        <circle cx="36" cy="72" r="2" fill="#6366f1"/>
        <circle cx="2" cy="18" r="2" fill="#6366f1"/>
        <circle cx="70" cy="18" r="2" fill="#6366f1"/>
        <circle cx="2" cy="54" r="2" fill="#6366f1"/>
        <circle cx="70" cy="54" r="2" fill="#6366f1"/>
        <text x="36" y="43" text-anchor="middle" fill="#fff" font-family="'JetBrains Mono',monospace" font-weight="700" font-size="20" letter-spacing="1">PRX</text>
      </g>
      <text x="92" y="52" fill="#fff" font-family="'Inter',sans-serif" font-weight="800" font-size="38" letter-spacing="-0.5">OpenPRX</text>
    </svg>
  </div>
</div>

<h2>Full Logo — Light</h2>
<div class="row">
  <div class="light-box">
    <svg width="320" height="80" viewBox="0 0 320 80">
      <g transform="translate(4,4)">
        <polygon points="36,2 66,18 66,54 36,70 6,54 6,18" fill="none" stroke="#4338ca" stroke-width="2.5"/>
        <circle cx="36" cy="0" r="2" fill="#4338ca"/>
        <circle cx="36" cy="72" r="2" fill="#4338ca"/>
        <circle cx="2" cy="18" r="2" fill="#4338ca"/>
        <circle cx="70" cy="18" r="2" fill="#4338ca"/>
        <circle cx="2" cy="54" r="2" fill="#4338ca"/>
        <circle cx="70" cy="54" r="2" fill="#4338ca"/>
        <text x="36" y="43" text-anchor="middle" fill="#4338ca" font-family="'JetBrains Mono',monospace" font-weight="700" font-size="20" letter-spacing="1">PRX</text>
      </g>
      <text x="92" y="52" fill="#18181b" font-family="'Inter',sans-serif" font-weight="800" font-size="38" letter-spacing="-0.5">OpenPRX</text>
    </svg>
  </div>
</div>

<h2>Icons — All Sizes</h2>
<div class="row">
  <div class="item">
    <div class="dark-box" style="padding:12px">
      <svg width="64" height="64" viewBox="0 0 48 48">
        <polygon points="24,3 43,13 43,35 24,45 5,35 5,13" fill="none" stroke="#6366f1" stroke-width="2"/>
        <circle cx="24" cy="1" r="1.5" fill="#6366f1"/><circle cx="24" cy="47" r="1.5" fill="#6366f1"/>
        <circle cx="3" cy="13" r="1.5" fill="#6366f1"/><circle cx="45" cy="13" r="1.5" fill="#6366f1"/>
        <circle cx="3" cy="35" r="1.5" fill="#6366f1"/><circle cx="45" cy="35" r="1.5" fill="#6366f1"/>
        <text x="24" y="28" text-anchor="middle" fill="#fff" font-family="'JetBrains Mono',monospace" font-weight="700" font-size="12" letter-spacing="0.5">PRX</text>
      </svg>
    </div>
    <span>64px Dark</span>
  </div>
  <div class="item">
    <div class="light-box" style="padding:12px">
      <svg width="64" height="64" viewBox="0 0 48 48">
        <polygon points="24,3 43,13 43,35 24,45 5,35 5,13" fill="none" stroke="#4338ca" stroke-width="2"/>
        <circle cx="24" cy="1" r="1.5" fill="#4338ca"/><circle cx="24" cy="47" r="1.5" fill="#4338ca"/>
        <circle cx="3" cy="13" r="1.5" fill="#4338ca"/><circle cx="45" cy="13" r="1.5" fill="#4338ca"/>
        <circle cx="3" cy="35" r="1.5" fill="#4338ca"/><circle cx="45" cy="35" r="1.5" fill="#4338ca"/>
        <text x="24" y="28" text-anchor="middle" fill="#4338ca" font-family="'JetBrains Mono',monospace" font-weight="700" font-size="12" letter-spacing="0.5">PRX</text>
      </svg>
    </div>
    <span>64px Light</span>
  </div>
  <div class="item">
    <div class="dark-box" style="padding:12px">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <polygon points="24,3 43,13 43,35 24,45 5,35 5,13" fill="none" stroke="#6366f1" stroke-width="2"/>
        <circle cx="24" cy="1" r="1.5" fill="#6366f1"/><circle cx="24" cy="47" r="1.5" fill="#6366f1"/>
        <circle cx="3" cy="13" r="1.5" fill="#6366f1"/><circle cx="45" cy="13" r="1.5" fill="#6366f1"/>
        <circle cx="3" cy="35" r="1.5" fill="#6366f1"/><circle cx="45" cy="35" r="1.5" fill="#6366f1"/>
        <text x="24" y="28" text-anchor="middle" fill="#fff" font-family="'JetBrains Mono',monospace" font-weight="700" font-size="12" letter-spacing="0.5">PRX</text>
      </svg>
    </div>
    <span>48px</span>
  </div>
  <div class="item">
    <div class="dark-box" style="padding:12px">
      <svg width="32" height="32" viewBox="0 0 32 32">
        <polygon points="16,2 29,9 29,23 16,30 3,23 3,9" fill="none" stroke="#6366f1" stroke-width="1.8"/>
        <text x="16" y="19" text-anchor="middle" fill="#fff" font-family="'JetBrains Mono',monospace" font-weight="700" font-size="8" letter-spacing="0.5">PRX</text>
      </svg>
    </div>
    <span>32px</span>
  </div>
  <div class="item">
    <div class="dark-box" style="padding:8px">
      <svg width="16" height="16" viewBox="0 0 16 16">
        <polygon points="8,1 15,5 15,11 8,15 1,11 1,5" fill="#6366f1"/>
        <text x="8" y="10" text-anchor="middle" fill="#fff" font-family="sans-serif" font-weight="900" font-size="5">PRX</text>
      </svg>
    </div>
    <span>Favicon 16px</span>
  </div>
</div>

<h2>GitHub Avatar</h2>
<div class="row">
  <div class="item">
    <div style="background:#09090b; width:128; height:128; display:flex; align-items:center; justify-content:center; border-radius:50%; border: 1px solid #1e1e22;">
      <svg width="80" height="80" viewBox="0 0 48 48">
        <polygon points="24,3 43,13 43,35 24,45 5,35 5,13" fill="none" stroke="#6366f1" stroke-width="2"/>
        <circle cx="24" cy="1" r="1.5" fill="#6366f1"/><circle cx="24" cy="47" r="1.5" fill="#6366f1"/>
        <circle cx="3" cy="13" r="1.5" fill="#6366f1"/><circle cx="45" cy="13" r="1.5" fill="#6366f1"/>
        <circle cx="3" cy="35" r="1.5" fill="#6366f1"/><circle cx="45" cy="35" r="1.5" fill="#6366f1"/>
        <text x="24" y="28" text-anchor="middle" fill="#fff" font-family="'JetBrains Mono',monospace" font-weight="700" font-size="12" letter-spacing="0.5">PRX</text>
      </svg>
    </div>
    <span>Circle Avatar</span>
  </div>
  <div class="item">
    <div style="background:#6366f1; width:128; height:128; display:flex; align-items:center; justify-content:center; border-radius: 16px;">
      <svg width="80" height="80" viewBox="0 0 48 48">
        <polygon points="24,3 43,13 43,35 24,45 5,35 5,13" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
        <text x="24" y="28" text-anchor="middle" fill="#fff" font-family="'JetBrains Mono',monospace" font-weight="700" font-size="12" letter-spacing="0.5">PRX</text>
      </svg>
    </div>
    <span>Branded Square</span>
  </div>
</div>

</body>
</html>
